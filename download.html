<!DOCTYPE html>
<html>
<head>
  <title>POLOLOLOFTE_dev - Main</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffffff, #767676);
      color: #333;
      text-align: center;
    }

    /* ===== MENU TOP ===== */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: linear-gradient(90deg, #000000, #333333);
      padding: 15px 0;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 25px;
      font-weight: bold;
      font-size: 18px;
      transition: 0.3s;
      position: relative;
    }

    .navbar a::after {
      content: "";
      position: absolute;
      width: 0;
      height: 3px;
      background: white;
      left: 0;
      bottom: -5px;
      transition: 0.3s;
    }

    .navbar a:hover::after {
      width: 100%;
    }

    .navbar a:hover {
      transform: scale(1.1);
    }

    /* ===== CONTENUTO ===== */
    .content {
      padding-top: 120px;
      animation: fadeIn 0.8s ease;
    }

    h1 {
      font-size: 60px;
    }

    p {
      font-size: 20px;
      max-width: 600px;
      margin: 20px auto;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      background: linear-gradient(45deg, #000000, #474747);
      border-radius: 50px;
      transition: 0.3s ease;
      margin-top: 20px;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* ===== ANIMAZIONE POP ===== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <div class="navbar">
    <a href="main.html">Main</a>
    <a href="download.html">Download</a>
    <a href="support.html">Support</a>
  </div>
