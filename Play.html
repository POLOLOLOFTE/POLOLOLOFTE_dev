<!DOCTYPE html>
<html>
<head>
  <title>Button Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    #game-container {
      margin: 20px auto;
      max-width: 600px;
      text-align: center;
    }

    #click-btn {
      padding: 20px 40px;
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(45deg, #000, #474747);
      color: white;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
    }

    #click-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #score {
      font-size: 28px;
      margin: 20px 0;
    }

    #restart-btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      display: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="game-container">
    <h1>Click The Button!</h1>
    <p>You have 10 seconds!</p>

    <button id="click-btn">Click to Start!</button>
    <div id="score">Score: 0</div>
    <p id="timer">Time: 10s</p>
    <button id="restart-btn">Restart</button>
  </div>

  <script>
    let score = 0;
    let time = 10;
    let countdown = null;
    let gameStarted = false;

    const btn = document.getElementById('click-btn');
    const scoreDisplay = document.getElementById('score');
    const timerDisplay = document.getElementById('timer');
    const restartBtn = document.getElementById('restart-btn');

    function startGame() {
      countdown = setInterval(() => {
        time--;
        timerDisplay.textContent = "Time: " + time + "s";

        if (time <= 0) {
          clearInterval(countdown);
          btn.disabled = true;
          btn.textContent = "Time's Up!";
          timerDisplay.textContent = "Game Over!";
          restartBtn.style.display = "inline-block";
        }
      }, 1000);
    }

    btn.addEventListener('click', () => {
      if (!gameStarted) {
        gameStarted = true;
        btn.textContent = "Click!";
        startGame();
      }

      if (time > 0) {
        score++;
        scoreDisplay.textContent = "Score: " + score;
      }
    });

    restartBtn.addEventListener('click', () => {
      // Reset variables
      score = 0;
      time = 10;
      gameStarted = false;

      // Reset UI
      scoreDisplay.textContent = "Score: 0";
      timerDisplay.textContent = "Time: 10s";
      btn.disabled = false;
      btn.textContent = "Click to Start!";
      restartBtn.style.display = "none";
    });

  </script>

</body>
</html>
