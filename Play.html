<!DOCTYPE html>
<html>
<head>
  <title>Button Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-top: 40px;
    }

    #game-container {
      text-align: center;
    }

    #leaderboard {
      border-left: 2px solid #ccc;
      padding-left: 30px;
      min-width: 200px;
    }

    #click-btn {
      padding: 20px 40px;
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(45deg, #000, #474747);
      color: white;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
    }

    #click-btn:hover {
      transform: scale(1.1);
    }

    #restart-btn {
      margin-top: 15px;
      padding: 8px 15px;
      display: none;
      cursor: pointer;
    }

    input {
      margin-top: 10px;
      padding: 5px;
    }

    ol {
      padding-left: 20px;
    }
  </style>
</head>

<body>

<div id="game-container">
  <h1>Click The Button!</h1>
  <p>You have 10 seconds!</p>

  <button id="click-btn">Click to Start!</button>
  <p id="score">Score: 0</p>
  <p id="timer">Time: 10s</p>

  <div id="nickname-section" style="display:none;">
    <p>New High Score! Enter your nickname:</p>
    <input type="text" id="nickname" placeholder="Your name">
    <button id="save-score">Save</button>
  </div>

  <button id="restart-btn">Restart</button>
</div>

<div id="leaderboard">
  <h2>Leaderboard (Session)</h2>
  <ol id="score-list"></ol>
</div>

<script>
  let score = 0;
  let time = 10;
  let countdown = null;
  let gameStarted = false;

  const btn = document.getElementById('click-btn');
  const scoreDisplay = document.getElementById('score');
  const timerDisplay = document.getElementById('timer');
  const restartBtn = document.getElementById('restart-btn');
  const nicknameSection = document.getElementById('nickname-section');
  const nicknameInput = document.getElementById('nickname');
  const saveScoreBtn = document.getElementById('save-score');
  const scoreList = document.getElementById('score-list');

  let leaderboard = JSON.parse(sessionStorage.getItem("leaderboard")) || [];

  function updateLeaderboard() {
    scoreList.innerHTML = "";
    leaderboard.sort((a, b) => b.score - a.score);
    leaderboard.forEach(entry => {
      const li = document.createElement("li");
      li.textContent = entry.name + " - " + entry.score;
      scoreList.appendChild(li);
    });
    sessionStorage.setItem("leaderboard", JSON.stringify(leaderboard));
  }

  updateLeaderboard();

  function startGame() {
    countdown = setInterval(() => {
      time--;
      timerDisplay.textContent = "Time: " + time + "s";

      if (time <= 0) {
        clearInterval(countdown);
        btn.disabled = true;
        btn.textContent = "Time's Up!";
        timerDisplay.textContent = "Game Over!";
        restartBtn.style.display = "inline-block";

        nicknameSection.style.display = "block";
      }
    }, 1000);
  }

  btn.addEventListener('click', () => {
    if (!gameStarted) {
      gameStarted = true;
      btn.textContent = "Click!";
      startGame();
    }

    if (time > 0) {
      score++;
      scoreDisplay.textContent = "Score: " + score;
    }
  });

  saveScoreBtn.addEventListener('click', () => {
    const name = nicknameInput.value.trim();
    if (name !== "") {
      leaderboard.push({ name: name, score: score });
      updateLeaderboard();
      nicknameInput.value = "";
      nicknameSection.style.display = "none";
    }
  });

  restartBtn.addEventListener('click', () => {
    score = 0;
    time = 10;
    gameStarted = false;

    scoreDisplay.textContent = "Score: 0";
    timerDisplay.textContent = "Time: 10s";
    btn.disabled = false;
    btn.textContent = "Click to Start!";
    restartBtn.style.display = "none";
    nicknameSection.style.display = "none";
  });
</script>

</body>
</html>
